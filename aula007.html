<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Crise sua conta</h1>
    <form>
        <label for="name">Nome completo</label><br>
        <input id="name" type="text" placeholder="Informe seu nome completo" required><br>
        <label for="e-mail">Informe seu e-mail</label><br>
        <input id="e-mail" type="email" placeholder="Informe seu e-mail" required><br>
        <label for="date">Data de nascimento</label><br>
        <input id="date" type="number" placeholder="dd/mm/aaaa" required><br>
        <input type="submit" value="Próximo">
    </form>
</body>
</html>
